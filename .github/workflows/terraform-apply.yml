name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest

    # ===========================================================
    # THE DEPLOY GATE.
    # Binding this job to the `production` environment makes the
    # whole job PAUSE before any step runs, until a required
    # reviewer on that environment approves it in the UI.
    # Configure reviewers in: Settings > Environments > production.
    # ===========================================================
    environment: production

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-terraform
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=iis-test/terraform.tfstate" \
            -backend-config="dynamodb_table=terraform-locks"

      # A plan is printed here too, so the approver can eyeball exactly
      # what is about to change in the run logs before the apply step.
      - name: Terraform plan
        run: terraform plan -no-color

      - name: Terraform destroy
        run: terraform destroy -auto-approve

      - name: Show outputs
        run: terraform output -json
